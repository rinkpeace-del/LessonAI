<!doctype html>
<html lang="ja">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LessonAI | AI学習支援ツール</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P60FCMBP1W"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-P60FCMBP1W');
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6369944794094649" crossorigin="anonymous"></script>
  </head>
  
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="教材作成ツール">
        <aside class="panel builder-panel">
          <div class="brand-block">
            <span class="brand-mark">L</span>
            <div>
              <h1>LessonAI</h1>
              <p>苦手な単元の練習教材をAIが数分で作ります</p>
            </div>
          </div>

          <div id="referral-banner" class="referral-banner hidden">
            <p id="referral-banner-text">招待リンクからアクセスしました。登録して1ヶ月無料で始めよう！</p>
          </div>

          <div id="auth-bar" class="auth-bar">
            <div id="user-info" class="user-info hidden">
              <span id="user-email" class="user-email"></span>
              <span id="usage-badge" class="usage-badge"></span>
              <button id="upgrade-button" type="button" class="upgrade-button hidden">Proにアップグレード</button>
              <button id="logout-button" type="button" class="logout-button">ログアウト</button>
            </div>
            <button id="login-button" type="button" class="login-button hidden">Googleでログイン</button>
          </div>

          <div id="referral-section" class="referral-section hidden">
            <div class="referral-section-header">
              <span class="referral-section-label">友達を招待して1ヶ月無料</span>
              <span id="referral-count-text" class="referral-count-text"></span>
            </div>
            <div class="referral-link-row">
              <input id="referral-link-input" type="text" readonly class="referral-link-input" aria-label="紹介リンク" />
              <button id="copy-referral-button" type="button" class="copy-referral-button">コピー</button>
            </div>
          </div>

          <form id="lesson-form" class="lesson-form">
            <label>
              教科
              <select id="subject">
                <option>英語</option>
                <option>国語</option>
                <option>数学</option>
                <option>理科</option>
                <option>社会</option>
                <option>総合</option>
              </select>
            </label>

            <label>
              学年
              <select id="grade">
                <option>小学3年</option>
                <option>小学4年</option>
                <option>小学5年</option>
                <option>小学6年</option>
                <option selected>中学1年</option>
                <option>中学2年</option>
                <option>中学3年</option>
                <option>高校</option>
              </select>
            </label>

            <label class="wide">
              単元・テーマ
              <input id="topic" type="text" value="be動詞の基本" placeholder="例: 現在完了、比例と反比例、物語文の読解" />
            </label>

            <label class="wide">
              AIモデル
              <select id="ai-model">
                <option value="claude-sonnet-4-6">Claude Sonnet（標準）</option>
                <option value="claude-haiku-4-5-20251001">Claude Haiku（高速）</option>
                <option value="gpt-5.5">GPT-5.5</option>
              </select>
            </label>

            <label>
              難易度
              <select id="level">
                <option>やさしい</option>
                <option selected>標準</option>
                <option>発展</option>
              </select>
            </label>

            <label>
              学習時間
              <select id="duration">
                <option>30分</option>
                <option selected>45分</option>
                <option>50分</option>
                <option>90分</option>
              </select>
            </label>

            <fieldset class="wide">
              <legend>出力形式</legend>
              <label class="check"><input type="checkbox" name="audiences" value="student" checked />問題プリント</label>
              <label class="check"><input type="checkbox" name="audiences" value="teacher" checked />解答・解説</label>
            </fieldset>

            <label class="wide">
              こだわり・要望
              <textarea id="requirements" rows="5" placeholder="例: 基礎から丁寧に、解説を多めに入れてほしい。">苦手な部分をしっかり練習できるよう、基礎問題から発展問題まで段階的に出してほしい。</textarea>
            </label>

            <label class="wide file-field">
              参考PDF
              <input id="source-pdf" type="file" accept="application/pdf" />
              <span id="pdf-status" class="field-note">PDFを追加すると、その内容を参考に教材を作ります。</span>
            </label>

            <div id="share-bonus-banner" class="share-bonus-banner hidden wide">
              <p class="share-bonus-text">今月の残り回数が少なくなっています</p>
              <button id="share-bonus-button" type="button" class="share-bonus-button">X でシェアして+3回もらう</button>
            </div>

            <button type="submit" class="primary-button">
              <span id="generate-label">AIで教材を生成</span>
            </button>
            <p id="auth-message" class="auth-message"></p>
            <p id="status-message" class="status-message" role="status"></p>
          </form>

          <section class="history-panel" aria-label="最近作った教材">
            <div class="history-header">
              <h2>最近の教材</h2>
              <button id="clear-history-button" type="button">削除</button>
            </div>
            <div id="history-list" class="history-list"></div>
          </section>
        </aside>

        <section class="output-area">
          <header class="output-header">
            <div>
              <p class="eyebrow">Generated Material</p>
              <h2 id="output-title">be動詞の基本</h2>
            </div>
            <div class="actions">
              <button id="copy-button" type="button" title="コピー">Copy</button>
              <button id="edit-button" type="button" title="現在の教材を編集">編集</button>
              <button id="ai-edit-button" type="button" title="AIで現在の教材を修正">AI修正</button>
              <button id="save-edit-button" class="hidden" type="button" title="編集を保存">保存</button>
              <button id="cancel-edit-button" class="hidden" type="button" title="編集をキャンセル">取消</button>
              <button id="student-pdf-button" type="button" title="問題プリントをPDFで保存">問題PDF</button>
              <button id="teacher-pdf-button" type="button" title="解答・解説をPDFで保存">解答PDF</button>
            </div>
          </header>

          <nav class="tabs" aria-label="出力タブ">
            <button class="tab active" type="button" data-tab="student">問題プリント</button>
            <button class="tab" type="button" data-tab="teacher">解答・解説</button>
          </nav>

          <article id="student" class="result-panel"></article>
          <article id="teacher" class="result-panel hidden"></article>
          <div id="share-prompt" class="share-prompt hidden" aria-label="SNSシェア">
            <p class="share-prompt-text">教材が完成しました！友達にも教えてあげよう</p>
            <button id="share-x-button" type="button" class="share-x-button">X でシェアする</button>
          </div>

          <div id="referral-prompt" class="referral-prompt hidden" aria-label="友達紹介">
            <p class="referral-prompt-text">教材が完成しました！友達を招待すると、あなたも友達も1ヶ月無料になります。</p>
            <button id="copy-referral-prompt-button" type="button" class="copy-referral-prompt-button">紹介リンクをコピー</button>
          </div>

          <section id="ai-edit-panel" class="ai-edit-panel hidden" aria-label="AI修正">
            <label>
              AIへの修正指示
              <textarea id="ai-edit-instruction" rows="3" placeholder="例: もっとやさしくして、問題を3問増やす"></textarea>
            </label>
            <div class="ai-edit-actions">
              <button id="run-ai-edit-button" type="button">修正する</button>
              <button id="close-ai-edit-button" type="button">閉じる</button>
            </div>
          </section>
        </section>
      </section>
    </main>

    <div id="upgrade-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
      <div class="modal">
        <h2>今月の無料回数を使い切りました</h2>
        <p>無料プランでは月3回まで教材を作れます。<br>Proプランなら無制限で使えます。</p>
        <div class="modal-actions">
          <button id="go-pro-button" type="button" class="primary-button">Proにアップグレード（¥980/月）</button>
          <button id="close-modal-button" type="button" class="modal-cancel">閉じる</button>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <a href="/blog/">ブログ</a>
      <a href="/terms.html">利用規約</a>
      <a href="/privacy.html">プライバシーポリシー</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
